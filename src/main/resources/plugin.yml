name: DeathPin
version: '${project.version}'
main: dev.zyvera_systems.deathpin.DeathPinPlugin
api-version: '1.21'
authors: [ Zyvera-Systems, Thomas U. ]
description: "Clickable death message + particle trail back to your death location."
website: https://modrinth.com/plugin/deathpin

commands:
  deathpin:
    description: "Manage your DeathPin trail."
    usage: "/deathpin <show|hide|info|reload>"
    aliases: [ dp, pin, dpin ]
    permission: deathpin.use

permissions:
  deathpin.use:
    description: "Allows using DeathPin."
    default: true
  deathpin.reload:
    description: "Allows reloading the config."
    default: op
  deathpin.bypass.world:
    description: "Cross-world trail support."
    default: op
