# ─────────────────────────────────────────────
#   DeathPin  ·  Configuration
#   Authors: Zyvera-Systems, Thomas U.
# ─────────────────────────────────────────────

# ── Death Message ─────────────────────────────
message:
  # Show coordinates in the death message
  show_coordinates: true
  # Show compass direction (N / NE / E / SE / S / SW / W / NW)
  show_direction: true
  # Show the world name in the death message
  show_world: false

# ── Particle Trail ────────────────────────────
trail:
  # Enable trail feature globally
  enabled: true

  # Particle type. Common values:
  #   END_ROD, FLAME, SOUL, DUST (colored), SPELL_WITCH, VILLAGER_HAPPY
  particle: END_ROD

  # Only used when particle is DUST
  dust_color: "255,80,80"
  dust_size: 1.2

  trail_length: 9.0       # blocks ahead the trail extends
  spacing: 0.5            # gap between each particle
  start_offset: 1.8       # distance in front of player before trail starts

  update_ticks: 3         # how often particles are displayed (3 = 150ms)
  recalculate_ticks: 30   # how often the path is recomputed (30 = 1.5s)

  arrival_distance: 2.5   # distance at which the trail auto-stops

sound:
  on_activate: ENTITY_EXPERIENCE_ORB_PICKUP
  on_deactivate: BLOCK_NOTE_BLOCK_BASS
  on_arrival: ENTITY_PLAYER_LEVELUP

# MiniMessage format: https://docs.advntr.dev/minimessage
messages:
  prefix: "<dark_gray>[<red>✝</red> <white>DeathPin</white><dark_gray>] "

  death_header: "<red><bold>☠ Du bist gestorben!</bold></red>"
  death_location: "<gray>Todesstelle: <white>X: <x>  Y: <y>  Z: <z></white>"
  death_direction: "<gray>Richtung: <white><direction></white>"
  death_world: "<gray>Welt: <white><world></white>"
  death_click_button: "<yellow>[<bold>✦ Partikelspur aktivieren</bold>]</yellow>"
  death_click_hover: "<gray>Klicke, um die Partikelspur\nzu deiner Todesstelle zu aktivieren."
  death_click_command: "/deathpin show"

  trail_activated: "<green>✔ Partikelspur aktiviert. Folge den Partikeln!"
  trail_deactivated: "<yellow>✖ Partikelspur deaktiviert."
  trail_already_active: "<yellow>⚠ Die Partikelspur ist bereits aktiv."
  trail_not_active: "<yellow>⚠ Du hast gerade keine aktive Partikelspur."
  trail_no_death: "<red>⚠ Es ist kein Todesstelle gespeichert."
  trail_arrived: "<green><bold>✔ Du hast deine Todesstelle erreicht!</bold></green>"
  trail_different_world: "<red>⚠ Deine Todesstelle ist in einer anderen Welt (<world>)."

  info_header: "<dark_gray>──── <red>✝ DeathPin</red> ────"
  info_no_death: "<gray>Keine Todesstelle vorhanden."
  info_location: "<gray>Letzte Todesstelle: <white>X:<x> Y:<y> Z:<z></white> (<world>)"
  info_trail_active: "<gray>Partikelspur: <green>aktiv</green>"
  info_trail_inactive: "<gray>Partikelspur: <red>inaktiv</red>"

  cmd_usage: "<red>Verwendung: /deathpin <show|hide|info|reload>"
  cmd_no_permission: "<red>⚠ Du hast keine Berechtigung dafür."
  cmd_players_only: "<red>⚠ Nur für Spieler."
  config_reloaded: "<green>✔ Konfiguration neu geladen."
